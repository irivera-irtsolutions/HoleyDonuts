            # Fresh Organic Coffee (UberEats - menu image)
            curl -fL "https://d1ralsognjng37.cloudfront.net/4165ecce-68ac-43a9-8cf4-c0ff0f0642e2.jpeg" -o images/fresh-organic-coffee.jpg || true
            # Bottled Water - Ozarka (UberEats - menu image)
