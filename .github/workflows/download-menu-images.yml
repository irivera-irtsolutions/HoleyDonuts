          curl -fL "https://img.cdn4dd.com/p/fit=cover,width=1200,height=1200,format=auto,quality=90/media/photos/f8f1759f-512d-4992-b954-c9286f0f1dfa-retina-large.jpg" -o images/chocolate-donut.jpg || true
