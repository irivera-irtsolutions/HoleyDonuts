<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.5" fill="rgba(184,105,42,0.07)"/>
    </pattern>
    <radialGradient id="halo" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="rgba(232,168,76,0.18)"/>
      <stop offset="70%" stop-color="rgba(232,168,76,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#FEF8EE"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>
  <rect x="32" y="32" width="1136" height="566"
        fill="none" stroke="rgba(61,31,11,0.18)"
        stroke-width="3" stroke-dasharray="10,8" rx="24"/>

  <!-- Donut illustration -->
  <g transform="translate(600 220)">
    <circle r="110" fill="#F4C99A"/>
    <circle r="38" fill="#FEF8EE"/>
    <!-- Pink glaze drip on top -->
    <path d="M -90 -10 Q -88 30 -75 50 L -55 -15 Z" fill="#C96B5A" opacity="0.85"/>
    <path d="M 60 -10 Q 65 30 78 50 L 95 -15 Z" fill="#C96B5A" opacity="0.85"/>
    <path d="M -10 -90 Q -8 -55 0 -45 L 12 -88 Z" fill="#C96B5A" opacity="0.85"/>
    <!-- Sprinkles -->
    <rect x="-58" y="-30" width="4" height="12" fill="#E8A84C" transform="rotate(20 -56 -24)"/>
    <rect x="30" y="-15" width="4" height="12" fill="#06C167" transform="rotate(-30 32 -9)"/>
    <rect x="-25" y="45" width="4" height="12" fill="#FF3008" transform="rotate(45 -23 51)"/>
    <rect x="40" y="40" width="4" height="12" fill="#3D1F0B" transform="rotate(-15 42 46)"/>
    <rect x="-5" y="-55" width="4" height="12" fill="#06C167" transform="rotate(60 -3 -49)"/>
    <rect x="55" y="15" width="4" height="12" fill="#E8A84C" transform="rotate(80 57 21)"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="410" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="88"
        font-weight="bold" fill="#3D1F0B">Holey Donuts</text>

  <!-- Tagline -->
  <text x="600" y="475" text-anchor="middle"
        font-family="Georgia, serif" font-size="34"
        font-style="italic" fill="#B8692A">Fresh Handmade Donuts &amp; Kolaches</text>

  <!-- Location -->
  <text x="600" y="540" text-anchor="middle"
        font-family="Georgia, serif" font-size="28"
        fill="rgba(61,31,11,0.6)">Denton, TX</text>
</svg>
